short_bio: >-
  <p>
    I am a Ph.D. student in the VCC group at the College of Computer Science and Software Engineering (CSSE), Shenzhen University, where I am fortunate to be advised by Associate Professor <a href="https://pengfeixu.com/" target="_blank">Pengfei Xu</a>.
  </p>
  <p>
    My research interests primarily lie in deep learning generative models and latent space exploration, with a special focus on 3D and vector shapes. Currently, I am actively exploring advanced techniques such as diffusion models and flow matching to tackle complex generation tasks, including multi-level representation and image-to-vector sketch synthesis.
  </p>

